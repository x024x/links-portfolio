        :root { --primary: #9d00ff; --bg: #030303; --text: #ffffff; }
        
        body {

            min-height: 100vh; 
            position: relative; 
            overflow: hidden; 
            margin: 0;

        body::before {

        .name { font-family: 'Satisfy', cursive; font-size: 2.8rem; color: var(--primary); text-shadow: 0 0 20px rgba(157, 0, 255, 0.8); margin-bottom: 5px; }

            margin-bottom: 18px; 
            border-radius: 15px; 
            border: 1px solid rgba(157, 0, 255, 0.3) !important; 
            transition: all 0.4s ease; 
        }

        .link:hover { transform: scale(1.03); background: rgba(157, 0, 255, 0.2) !important; }
        
        .icon { width: 24px; margin-right: 15px; color: var(--primary); display: flex; align-items: center; }
