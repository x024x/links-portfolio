<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDRA | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500&display=swap');
        
        :root { 
            --primary: rgba(255, 255, 255, 0.8); 
            --bg: #000000; 
            --text: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100%; 
            position: relative; 
            overflow-x: hidden;
            font-family: 'Lexend', sans-serif;
        }

        .background-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .background-image img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.7; 
        }

        .container { 
            width: 90%; max-width: 400px; 
            padding: 40px 20px; text-align: center; 
            z-index: 10; position: relative; 
        }

        .profile-img { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); object-fit: cover; 
        }

        .name { font-weight: 500; font-size: 2.2rem; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.6); margin-bottom: 8px; }
        .bio { font-weight: 300; font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 35px; }

        .link { 
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.03) !important; 
            backdrop-filter: blur(10px) saturate(150%) !important; 
            -webkit-backdrop-filter: blur(10px) saturate(150%) !important; 
            color: #fff; text-decoration: none; padding: 14px 20px; 
            margin-bottom: 15px; border-radius: 18px; 
            border: 1px solid rgba(255, 255, 255, 0.12) !important; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .link:hover { 
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.08) !important; 
            border-color: rgba(255, 255, 255, 0.4) !important; 
        }

        /* تنسيق الدائرة البيضاء للأيقونة */
        .icon-wrapper {
            width: 32px; height: 32px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .icon-wrapper svg {
            width: 18px; height: 18px;
            fill: #000; /* لون الأيقونة داخل الدائرة */
        }

        .link-text { font-size: 1rem; font-weight: 300; letter-spacing: 0.5px; }
    </style>
</head>
