<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDRA | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500&display=swap');
        
        :root { 
            --primary: rgba(255, 255, 255, 0.8); 
            --bg: #000000; 
            --text: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100%; 
            position: relative; 
            overflow-x: hidden;
            font-family: 'Lexend', sans-serif;
        }

        .background-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .background-image img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.7; 
        }

        .container { 
            width: 85%; max-width: 350px; 
            padding: 30px 15px; text-align: center; 
            z-index: 10; position: relative; 
        }

        .profile-img { 
            width: 100px; height: 100px; 
            border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 15px; 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1); object-fit: cover; 
        }

        .name { font-weight: 500; font-size: 1.8rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); margin-bottom: 5px; }
        .bio { font-weight: 300; font-size: 0.8rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 25px; }

        .link { 
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.03) !important; 
            backdrop-filter: blur(8px) saturate(150%) !important; 
            -webkit-backdrop-filter: blur(8px) saturate(150%) !important; 
            color: #fff; text-decoration: none; 
            padding: 10px 18px; 
            margin-bottom: 10px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1) !important; 
            transition: all 0.3s ease;
        }
        
        .link:hover { 
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.06) !important; 
            border-color: rgba(255, 255, 255, 0.3) !important; 
        }

        .icon-wrapper {
            width: 28px; height: 28px; 
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            overflow: hidden;
            padding: 5px;
        }

        .icon-wrapper img {
            width: 100%; height: 100%;
            object-fit: contain;
            filter: brightness(0) saturate(100%); 
        }

        .link-text { font-size: 0.9rem; font-weight: 300; }
    </style>
</head>
<body>

    <div class="background-image">
        <img src="./png/Assassins%20can%20fly.gif" alt="background">
    </div>
    
    <div class="container">
        <div class="profile">
            <img src="./png/ddfp.png" alt="Profile" class="profile-img">
            <h1 class="name">INDRA</h1>
            <p class="bio">I can't help myself from lookin' for ya</p>
        </div>

        <a href="https://t.me/xargents" class="link">
            <div class="icon-wrapper"><img src="./png/tg.png" alt="Telegram"></div>
            <span class="link-text">Telegram</span>
        </a>

        <a href="https://tellonym.me/fakepromises/whatdou" class="link">
            <div class="icon-wrapper"><img src="./png/tl.png" alt="Tellonym"></div>
            <span class="link-text">Tellonym</span>
        </a>

        <a href="https://discord.com/users/1025529031283703819" class="link">
            <div class="icon-wrapper"><img src="./png/dc.png" alt="Discord"></div>
            <span class="link-text">Discord</span>
        </a>

        <a href="https://music.apple.com/us/playlist/%25D8%25B9%25D8%25B1%25D8%25A7%25D9%2582%25D9%258A/pl.u-9N9L2a4t1M6kqR4" class="link">
            <div class="icon-wrapper"><img src="./png/am.png" alt="Apple Music"></div>
            <span class="link-text">Apple Music</span>
        </a>

        <a href="https://spotify.com" class="link">
            <div class="icon-wrapper"><img src="./png/sp.png" alt="Spotify"></div>
            <span class="link-text">Spotify</span>
        </a>

    </div>

</body>
</html>
