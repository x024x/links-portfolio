<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INDRA | Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500&display=swap');
        
        :root { 
            --primary: rgba(255, 255, 255, 0.8); 
            --bg: #000000; 
            --text: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100%; 
            position: relative; 
            overflow: hidden;
            font-family: 'Lexend', sans-serif;
        }

        .background-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .background-image img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.7; 
        }

        .container { 
            width: 100%; max-width: 400px; 
            padding: 25px; text-align: center; 
            z-index: 10; position: relative; 
            max-height: 90vh;
            overflow-y: auto;
        }
        
        /* إخفاء شريط التمرير */
        .container::-webkit-scrollbar { display: none; }

        .profile-img { 
            width: 115px; height: 115px; border-radius: 50%; 
            border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 20px; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); object-fit: cover; 
        }

        .name { font-weight: 500; font-size: 2.2rem; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.6); margin-bottom: 8px; }
        .bio { font-weight: 300; font-size: 0.9rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 30px; }

        .link { 
            display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.02) !important; 
            backdrop-filter: blur(5px) saturate(130%) !important; 
            -webkit-backdrop-filter: blur(5px) saturate(130%) !important; 
            color: #fff; text-decoration: none; padding: 15px 22px; 
            margin-bottom: 12px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.15) !important; 
            transition: all 0.4s ease;
            text-align: left;
        }
        
        .link:hover { 
            transform: translateY(-3px); 
            background: rgba(255, 255, 255, 0.08) !important; 
            border-color: rgba(255, 255, 255, 0.5) !important; 
        }

        .icon { width: 22px; margin-right: 15px; color: #fff; display: flex; align-items: center; }
        .icon svg { fill: currentColor; width: 100%; }
    </style>
</head>
